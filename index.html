<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link href="./styles.css" rel="stylesheet">
    <script src="./script.js" defer></script>
</head>
<body>
    <h1>My Library Website!</h1>
    <button command="show-modal" commandfor="book-dialog">New Book</button>
    <dialog id="book-dialog" closedby="any">
        <p>Add a new book.</p>

        <form action="" method="dialog">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="author">Author:</label>
                <input type="text" id="author" name="author" required>
            </div>

            <div class="form-group">
                <label for="pages">Pages:</label>
                <input type="number" id="pages" name="pages" required min="1">
            </div>

            <button type="submit">Create Book</button>
        </form>

        <button commandfor="book-dialog" command="close">Cancel</button>
    </dialog>
    <div class="library">
        
    </div>
</body>
</html>
